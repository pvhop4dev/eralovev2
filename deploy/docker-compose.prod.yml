services:
  postgres:
    image: postgres:16-alpine
    container_name: eralove-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eralove}
      POSTGRES_USER: ${POSTGRES_USER:-eralove}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eralove_prod_pwd}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eralove}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eralove-prod-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: eralove-prod-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: eralove-api:latest
    container_name: eralove-prod-api
    restart: always
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - APP_NAME=Eralove API (Prod)
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-eralove}:${POSTGRES_PASSWORD:-eralove_prod_pwd}@postgres:5432/${POSTGRES_DB:-eralove}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-this-in-production-immediately}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-eralove-media}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://minio:9000
      - CORS_ORIGINS=["http://localhost:3000", "https://love.eraquix.com"]
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
    ports:
      - "8000:8000"

  web:
    image: eralove-web:latest
    container_name: eralove-prod-web
    restart: always
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_S3_BUCKET_URL=${NEXT_PUBLIC_S3_BUCKET_URL:-http://localhost:9000/eralove-media}
    ports:
      - "3000:3000"

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
